<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Explore the cinematic digital marketing and high-performance SMMA case studies by BEACON.">
    <meta name="author" content="BEACON SMMA">

    <title>Project Detail | BEACON SMMA</title>
</head>

<body class="bg-black text-white overflow-x-hidden selection:bg-gold selection:text-black">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 transition-all duration-500 bg-black/80 backdrop-blur-xl border-b border-white/5"
        id="navbar">
        <div class="max-w-7xl mx-auto px-6 lg:px-12 py-3 flex justify-between items-center">
            <a href="index.html" class="group">
                <img src="images/beacon-logo.jpg" alt="BEACON Logo" class="h-9 w-auto rounded-lg">
            </a>
            <a href="index.html#portfolio"
                class="text-sm font-bold tracking-widest uppercase hover:text-gold transition-colors">Back to
                Portfolio</a>
        </div>
    </nav>

    <div id="project-content" class="overflow-x-hidden">
        <!-- Content will be dynamically inserted here -->
    </div>

    <!-- Footer -->
    <footer class="py-20 border-t border-white/5 bg-black">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-start gap-12">
            <div>
                <a href="index.html" class="mb-6 block group">
                    <img src="images/beacon-logo.jpg" alt="BEACON Logo" class="h-10 w-auto rounded-lg">
                </a>
                <p class="text-gray-500 max-w-xs mb-6 text-sm">Leading Social Media Marketing Agency in Ethiopia.
                    Empowering brands through cinematic digital strategy.</p>
                <div class="space-y-3 text-xs text-gray-400">
                    <p class="flex items-center gap-3 text-gold">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        beaconsmma1@gmail.com
                    </p>
                    <p class="flex items-center gap-3">
                        <svg class="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        Jimma, Ethiopia
                    </p>
                    <p class="flex items-center gap-3">
                        <svg class="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                        </svg>
                        +251 952 819 590
                    </p>
                </div>
            </div>
            <div class="text-[10px] text-gray-700 uppercase tracking-[0.4em] self-end">
                &copy; 2026 BEACON SMMA
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        const projects = {
            'cinematography': {
                category: 'Cinematography',
                title: 'High Motion Reel',
                description: 'High-performance commercial shoot capturing motion and speed.',
                overview: 'This project pushed the limits of high-speed cinematography. Utilizing specialized gimbal rigs and high-frame-rate capture (120fps), we emphasized fluid motion in a structured production environment.',
                images: [],
                videos: ['videos/project-1.mp4'],
                stats: [
                    { value: '8K', label: 'Raw Resolution' },
                    { value: '120fps', label: 'Slow Motion' },
                    { value: 'PRO', label: 'Rigging' }
                ],
                nextProject: { slug: 'photography', title: 'Golden Hour Wedding', image: 'images/projects/wedding-photo.jpg' }
            },
            'photography': {
                category: 'Photography',
                title: 'Golden Hour Wedding',
                description: 'Premium product photography highlighting texture and elegance.',
                overview: 'Wedding photography is about more than just images; it is about capturing the soul of a moment. For this high-profile event, we focused on soft, warm lighting and organic compositions.',
                images: [
                    'images/projects/wedding-photo.jpg'
                ],
                stats: [
                    { value: '50MP', label: 'Stills Detail' },
                    { value: 'Natural', label: 'Light' },
                    { value: 'Elegance', label: 'Theme' }
                ],
                nextProject: { slug: 'editing', title: 'The Rhythm of City', image: 'images/cinematography.png' }
            },
            'editing': {
                category: 'Video Editing',
                title: 'The Rhythm of City',
                description: 'Narrative-driven documentary editing with a focus on rhythm.',
                overview: 'The Rhythm of City focuses on the pulse of urban life. The edit uses aggressive rhythmic cuts and a cinematic color grade to visualize the heartbeat of Addis Ababa.',
                images: [],
                videos: ['videos/project-2.mp4'],
                stats: [
                    { value: '72h', label: 'Edit Time' },
                    { value: 'DaVinci', label: 'Color Grade' },
                    { value: 'Custom', label: 'Sound' }
                ],
                nextProject: { slug: 'cinematography', title: 'High Motion Reel', image: 'images/cinematography.png' }
            }
        };

        function loadProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const projectSlug = urlParams.get('project');
            const project = projects[projectSlug] || projects['cinematography'];

            const content = `
                <section class="pt-40 pb-20 px-6">
                    <div class="max-w-7xl mx-auto">
                        <div class="mb-12" data-aos="fade-up">
                            <span class="text-gold tracking-widest uppercase text-xs mb-4 block font-bold">${project.category}</span>
                            <h1 class="text-5xl md:text-8xl font-bold mb-8 serif italic"><span class="gold-gradient">${project.title}</span></h1>
                            <p class="text-xl text-gray-400 max-w-2xl leading-relaxed">${project.description}</p>
                        </div>
                        
                        <div class="grid lg:grid-cols-2 gap-12 mb-20">
                            <div class="glass-card p-4 overflow-hidden relative" data-aos="fade-right">
                                ${project.videos ?
                    `<video src="${project.videos[0]}" controls class="w-full rounded-2xl"></video>` :
                    `<img src="${project.images[0]}" class="w-full rounded-2xl">`
                }
                            </div>
                            <div class="flex flex-col justify-center" data-aos="fade-left">
                                <h2 class="text-xl font-bold mb-4 gold-gradient uppercase tracking-widest text-xs">Concept & Vision</h2>
                                <p class="text-gray-300 leading-relaxed text-base mb-8">${project.overview}</p>
                                <div class="grid grid-cols-3 gap-4">
                                    ${project.stats.map(s => `
                                        <div>
                                            <span class="block text-2xl font-bold text-white mb-1">${s.value}</span>
                                            <span class="text-[10px] text-gray-500 uppercase tracking-widest">${s.label}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
                            ${project.images.length > 0 ? project.images.map((img, i) => `
                                <div class="glass-card p-4 h-[400px]" data-aos="fade-up" data-aos-delay="${i * 100}">
                                    <img src="${img}" class="w-full h-full object-cover rounded-xl">
                                </div>
                            `).join('') : `
                                <div class="md:col-span-2 glass-card p-12 flex items-center justify-center bg-zinc-950 border border-white/5" data-aos="fade-up">
                                    <div class="text-center">
                                        <h2 class="text-6xl font-black gold-gradient italic opacity-20">B</h2>
                                        <p class="text-gray-600 tracking-[1em] text-[10px] mt-3 uppercase">Cinematic Sequence</p>
                                    </div>
                                </div>
                            `}
                        </div>

                        <div class="text-center py-20 border-t border-white/5">
                            <h2 class="text-2xl font-bold mb-10 serif italic">Next In <span class="gold-gradient">Series</span></h2>
                            <a href="project-detail.html?project=${project.nextProject.slug}" class="group block max-w-4xl mx-auto glass-card p-4 overflow-hidden relative">
                                <div class="w-full h-[400px] bg-zinc-900 rounded-2xl flex items-center justify-center group-hover:bg-zinc-800 transition-colors duration-700">
                                    <span class="text-4xl font-black gold-gradient italic opacity-40">B</span>
                                </div>
                                <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="text-3xl font-bold gold-gradient italic serif">${project.nextProject.title}</span>
                                </div>
                            </a>
                        </div>
                    </div>
                </section>
            `;

            document.getElementById('project-content').innerHTML = content;
            AOS.init({ duration: 1200, once: true });
        }

        window.addEventListener('DOMContentLoaded', loadProject);
    </script>
</body>

</html>
